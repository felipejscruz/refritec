<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - REFRITEC</title>

  <link rel="stylesheet" href="auth.css">

   <!-- Ícones -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">
      <a href="index.html">
        <img src="logo.png" alt="REFRITEC">
      </a>
    </div>

    <nav>

      <a href="login.html">
        <i class="fa-regular fa-user"></i>
        Minha Conta
      </a>

      <a href="servicos.html">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        Serviços
      </a>

      <a href="contato.html">
        <i class="fa-solid fa-phone"></i>
        Contatos
      </a>

    </nav>

  </header>


  <div class="container">

    <div class="card">

      <h1>Área do Cliente</h1>

        <form id="formLogin">

          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email"
            id="email"
            placeholder="E-mail"
            required>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password"
            id="senha"
            placeholder="Senha"
            required>
          </div>

        <button type="submit">

          <i class="fa-solid fa-right-to-bracket"></i>

          ENTRAR

        </button>

      </form>

      <div class="link">

        Não possui conta?

        <a href="cadastro.html">
          Criar Conta
        </a>

      </div>

    </div>

  </div>

  <script type="module" src="login.js"></script>

</body>
</html>
