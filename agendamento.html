<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Novo Agendamento</title>

  <link rel="stylesheet" href="auth.css">
   <!-- Ícones -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">
      <a href="index.html">
        <img src="logo.png" alt="REFRITEC">
      </a>
    </div>

    <nav>

      <a href="login.html">
        <i class="fa-regular fa-user"></i>
        Minha Conta
      </a>

      <a href="servicos.html">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        Serviços
      </a>

      <a href="contato.html">
        <i class="fa-solid fa-phone"></i>
        Contatos
      </a>

    </nav>

  </header>

  <div class="container">

    <div class="card">

      <h1>Novo Agendamento</h1>

      <form id="agendamentoForm">

        <div class="input-group">

          <select id="servico" required>

            <option value="">
              Escolha o serviço
            </option>

            <option>
              Agendamento de Freezer
            </option>

            <option>
              Instalação de Ar
            </option>

            <option>
              Limpeza e Manutenção de Ar
            </option>

            <option>
              Manutenção em Geladeira
            </option>

            <option>
              Câmara Frigorífica
            </option>

          </select>

        </div>

        <div class="input-group">

        

          <input
          type="text"
          id="dataAgendamento"
          placeholder="Data do agendamento"
      
          onblur="if(!this.value)this.type='text'"
          required>

        </div>

        <div class="input-group">

          <textarea
          id="observacoes"
          placeholder="Observações do serviço"
          rows="5"></textarea>

        </div>

        <button type="submit">

          AGENDAR

        </button>

      </form>

    </div>

  </div>

  <script src="agendamento.js"></script>

</body>
</html>
