<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Contato - REFRITEC</title>

  <link rel="stylesheet" href="contato.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">
      <img src="logo.png" alt="REFRITEC">
    </div>

    <nav>

      <a href="painel.html">
        <i class="fa-regular fa-user"></i>
        Minha Conta
      </a>

      <a href="servicos.html">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        Serviços
      </a>

      <a href="contato.html">
        <i class="fa-solid fa-phone"></i>
        Contato
      </a>

    </nav>

  </header>

  <!-- CONTAINER -->

  <section class="contato-container">

    <!-- INFORMAÇÕES -->

    <div class="info-contato">

      <h1>Entre em Contato</h1>

      <p>
        Fale com a equipe REFRITEC e solicite
        atendimento especializado em refrigeração.
      </p>

      <div class="item">

        <i class="fa-solid fa-location-dot"></i>

        <span>
          Rua Exemplo, 123 - Centro
          <br>
          Montes Claros - MG
        </span>

      </div>

      <div class="item">

        <i class="fa-solid fa-phone"></i>

        <span>
          (38) 99999-9999
        </span>

      </div>

      <div class="item">

        <i class="fa-brands fa-whatsapp"></i>

        <span>
          WhatsApp:
          (38) 99999-9999
        </span>

      </div>

      <div class="item">

        <i class="fa-solid fa-envelope"></i>

        <span>
          contato@refritec.com
        </span>

      </div>

    </div>

    <!-- MAPA -->

    <div class="mapa">

      <iframe
      src="https://www.google.com/maps?q=Montes+Claros+MG&output=embed"
      allowfullscreen=""
      loading="lazy">
      </iframe>

    </div>

  </section>

  <!-- FOOTER -->

  <footer>

    © Copyright Refritec

  </footer>

</body>
</html>
