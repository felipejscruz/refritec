<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro - REFRITEC</title>

  <link rel="stylesheet" href="auth.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <header>

  <div class="logo">
    <img src="logo.png" alt="REFRITEC">
  </div>

  <nav>

    <a href="login.html">
      <i class="fa-regular fa-user"></i>
      Minha Conta
    </a>

    <a href="#">
      <i class="fa-solid fa-screwdriver-wrench"></i>
      Serviços
    </a>

    <a href="#">
      <i class="fa-solid fa-phone"></i>
      Contato
    </a>

  </nav>

</header>

  <div class="container">

    <div class="card">

      

      <h1>Criar Conta</h1>

      <form id="cadastroForm">

        <div class="input-group">
          <i class="fa-solid fa-user"></i>
          <input type="text"
          id="nome"
          placeholder="Nome / Empresa"
          required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-id-card"></i>
          <input type="text"
          id="cpf"
          placeholder="CPF / CNPJ"
          required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email"
          id="email"
          placeholder="E-mail"
          required>
        </div>

        <div class="input-group">
          <i class="fa-brands fa-whatsapp"></i>
          <input type="text"
          id="telefone"
          placeholder="Telefone / WhatsApp"
          required>
        </div>

        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password"
          id="senha"
          placeholder="Senha"
          required>
        </div>

        <button type="submit">

          <i class="fa-solid fa-user-plus"></i>

          CADASTRAR

        </button>

      </form>

      <div class="link">

        Já possui conta?

        <a href="login.html">
          Fazer Login
        </a>

      </div>

    </div>

  </div>

  <script src="cadastro.js"></script>

</body>
</html>
