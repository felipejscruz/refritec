<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Painel do Cliente</title>

  <link rel="stylesheet" href="auth.css">

</head>
  <header>

  <div class="logo">
      <a href="index.html">
        <img src="logo.png" alt="REFRITEC">
    </a>
    </div>

  <!-- BOTÃO MENU -->

  <div class="menu-mobile" onclick="abrirMenu()">

    <i class="fa-solid fa-bars"></i>

  </div>

  <!-- MENU -->

  <nav id="menu">

    <a href="painel.html">
      <i class="fa-regular fa-user"></i>
      Minha Conta
    </a>

    <a href="servicos.html">
      <i class="fa-solid fa-screwdriver-wrench"></i>
      Serviços
    </a>

    <a href="contato.html">
      <i class="fa-solid fa-phone"></i>
      Contato
    </a>

  </nav>

</header>

<body>

  <div class="container">

    <div class="card">

      <h1>
        Meus Agendamentos
      </h1>

      <br>

      <a
      href="agendamento.html"
      class="btnNovo">

        + Novo Agendamento

      </a>

      <div id="lista"></div>

    </div>

  </div>

  <script>

    const usuario =
    JSON.parse(localStorage.getItem("usuario"));

    if(!usuario){

      window.location.href =
      "login.html";

    }

    async function carregar(){

      const url =
      "SUA_URL_APPS_SCRIPT"
      + "?acao=agendamentos"
      + "&cpf=" + usuario.cpf;

      const resposta =
      await fetch(url);

      const dados =
      await resposta.json();

      const lista =
      document.getElementById("lista");

      if(dados.length == 0){

        lista.innerHTML = `
          <p style="margin-top:30px;">
            Nenhum agendamento encontrado.
          </p>
        `;

        return;

      }

      dados.forEach(item => {

        lista.innerHTML += `

          <div class="agendamento">

            <h3>${item.servico}</h3>

            <p>
              <b>Status:</b>
              ${item.status}
            </p>

            <p>
              <b>Observações:</b>
              ${item.observacoes}
            </p>

          </div>

        `;

      });

    }

    carregar();

  </script>

</body>
</html>
